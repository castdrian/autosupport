name: deploy autosupport

on:
  push:
    branches:
        - main
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DISCORD_TOKEN: MAAAAAAAAAAAAAAAAAAAAAAAAA.AAAAAA.AAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      OPEN_AI_API_KEY: sk-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      DATABASE_PATH: ":memory:"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx biome check .

      - name: Test
        run: bun test

  deploy:
    needs: test
    permissions:
        contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Automated Version Bump
        uses: phips28/gh-action-bump-version@v11.1.5
        with:
          skip-tag:  'true'
          major-wording: 'BREAKING CHANGE'
          minor-wording: 'feat:'
          commit-message: 'chore: bump version [skip ci]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy autosupport
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd autosupport
            git pull
            sudo docker compose up --build -d